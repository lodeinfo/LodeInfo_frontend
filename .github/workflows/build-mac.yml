name: Build macOS DMG

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm run mac
      - uses: actions/upload-artifact@v3
        with:
          name: dmg-release
          path: release/*.dmg
